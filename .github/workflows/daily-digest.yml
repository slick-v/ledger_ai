name: Daily expense digest

on:
  schedule:
    # 01:30 UTC = 07:00 IST
    - cron: "30 1 * * *"
  workflow_dispatch: {}

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily digest
        run: |
          curl -sS -X POST "${{ secrets.BACKEND_URL }}/notifications/send-daily-digest" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n" \
            --fail-with-body
